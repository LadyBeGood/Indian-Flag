                <div class="spoke" style="--i: 5">

                <div class="spoke" style="--i: 6">

                </div>
                <div class="spoke" style="--i: 11">
                    <div class="left"></div>
                    <div></div>
                    <div class="right"></div>
                </div>
                <div class="spoke" style="--i: 12">
                    <div class="left"></div>
                    <div></div>
                    <div class="right"></div>
                </div>
                

                <div class="dot-container" style="--i: 1">
                    <div class="dot"></div>

                <div class="dot-container" style="--i: 2">

        </div>
        <div class="green"></div>
    </div>



    <style>
        :root {
            /*************
            * COLORS 
            **************/
            --saffron: #FF671F;
            --white: #fff;
            --green: #046A38;
            --blue: #06038D;


            
            /*************
            * DIMENSIONS
            **************/
            /* All these values are based upon --FLAG-WIDTH, hence adjusting --FLAG-WIDTH will automatically adjust other values */
            --FLAG-WIDTH: 90vw;
            --FLAG-HEIGHT: calc(var(--FLAG-WIDTH) / 3 * 2);
            --ASHOKA-CHAKRA-SIZE: calc(var(--FLAG-HEIGHT) * 185 / 600);
            --ASHOKA-CHAKRA-BORDER-WIDTH: calc(var(--FLAG-HEIGHT) * 12.5 / 600);
            --ASHOKA-CHAKRA-CENTER-SIZE: calc(var(--FLAG-HEIGHT) * 32 / 600);
            --DOT-SIZE: calc(var(--FLAG-HEIGHT) * 7 / 600);
            --SPOKE-HEIGHT: calc(var(--FLAG-HEIGHT) * 6 / 600);
            --SPOKE-CENTER-SIZE: calc(var(--FLAG-HEIGHT) * 16 / 600);  /* approximately */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100svh;
            display: grid;
            place-items: center;
            background: black;
        }

        .container {
            width: var(--FLAG-WIDTH);
            height: var(--FLAG-HEIGHT);
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .saffron {
            background-color: var(--saffron);
        }

        .green {
            background-color: var(--green);
        }

        .white {
            background-color: var(--white);
            display: grid;
            place-items: center;
        }

        .ashoka-chakra {
            width: var(--ASHOKA-CHAKRA-SIZE);
            height: var(--ASHOKA-CHAKRA-SIZE);
            border-radius: 999px;
            background: var(--white);
            border: var(--ASHOKA-CHAKRA-BORDER-WIDTH) solid var(--blue);
            display: grid;
            place-items: center;
            position: relative;

            .center {
                height: var(--ASHOKA-CHAKRA-CENTER-SIZE);
                width: var(--ASHOKA-CHAKRA-CENTER-SIZE);
                background-color: var(--blue);
                border-radius: 999px;
            }
        }
        
        
        .spoke {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: 
                translate(-50%, -50%)
                rotate(calc(var(--i) * 15deg + 7.5deg));
            height: var(--SPOKE-HEIGHT);
            
            display: grid;
            grid-template-columns: 1fr var(--SPOKE-CENTER-SIZE) 1fr;
        
            .left {
                clip-path: polygon(0% 50%, 66.6666% 0%, 100% 50%, 66.6666% 100%);
                background: var(--blue);
            }
            
            .right {
                clip-path: polygon(100% 50%, 33.333333% 0%, 0% 50%, 33.3333% 100%);
                background: var(--blue);
            }
        }
        
        .dot-container {
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: 
                translate(-50%, -50%) 
                rotate(calc(var(--i) * 15deg));
            height: var(--DOT-SIZE);
            display: flex;
            justify-content: space-between;
        }
        
        .dot {
            background-color: var(--blue);
            height: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 999px;
        }
        
        .dot:first-of-type {
            transform: translateX(-50%);
        }
        
        .dot:last-of-type {
            transform: translateX(50%);
        }
    </style>

</body>
</html>
