                <div class="spoke-pair" style="--i: 6">

                    <div class="spoke-gap"></div>

                <div class="spoke-pair" style="--i: 7">

                <div class="spoke-pair" style="--i: 8">

                    <div class="spoke-gap"></div>

                </div>
                <div class="spoke-pair" style="--i: 9">
                    <div class="spoke"></div>
                    <div class="spoke-gap"></div>

                <div class="spoke-pair" style="--i: 10">
                    <div class="spoke"></div>
                    <div class="spoke-gap"></div>
                    <div class="spoke"></div>
                </div>
                <div class="spoke-pair" style="--i: 11">

                </div>
                <div class="bead-pair" style="--i: 5">
                    <div class="bead"></div>

                <div class="bead-pair" style="--i: 6">

        <div class="band-bottom"></div>
    </div>



    <style>
        /*====================================*/
        /* VARIABLES                          */
        /*====================================*/
        :root {
            /* ----- Colours ----- */
            --indian-saffron: #FF671F;
            --white: #fff;
            --indian-green: #046A38;
            --navy-blue: #06038D;


            /* ----- Dimensions ----- */
            /* All the dimesions are based upon --FLAG-WIDTH, hence adjusting --FLAG-WIDTH will automatically adjust other values */
            --FLAG-WIDTH: min(600px, 90vw);
            --FLAG-HEIGHT: calc(var(--FLAG-WIDTH) / 3 * 2);
            --ASHOKA-CHAKRA-SIZE: calc(var(--FLAG-HEIGHT) * 185 / 600);
            --ASHOKA-CHAKRA-BORDER-WIDTH: calc(var(--FLAG-HEIGHT) * 12.5 / 600);
            --ASHOKA-CHAKRA-HUB-SIZE: calc(var(--FLAG-HEIGHT) * 32 / 600);
            --BEAD-SIZE: calc(var(--FLAG-HEIGHT) * 7 / 600);
            --SPOKE-HEIGHT: calc(var(--FLAG-HEIGHT) * 6 / 600);
            --SPOKE-GAP-SIZE: calc(var(--FLAG-HEIGHT) * 16 / 600); /* approximately */
        }


        /*====================================*/
        /* RESET                              */
        /*====================================*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100svh;
            display: grid;
            place-items: center;
            background: black;
        }


        /*====================================*/
        /* STYLES                             */
        /*====================================*/
        .indian-flag {
            width: var(--FLAG-WIDTH);
            height: var(--FLAG-HEIGHT);
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;


            .band-top {
                background-color: var(--indian-saffron);
            }

            .band-middle {
                background-color: var(--white);
                display: grid;
                place-items: center;


                .ashoka-chakra {
                    width: var(--ASHOKA-CHAKRA-SIZE);
                    height: var(--ASHOKA-CHAKRA-SIZE);
                    border-radius: 999px;
                    background: var(--white);
                    border: var(--ASHOKA-CHAKRA-BORDER-WIDTH) solid var(--navy-blue);
                    display: grid;
                    place-items: center;
                    position: relative;


                    .hub {
                        height: var(--ASHOKA-CHAKRA-HUB-SIZE);
                        width: var(--ASHOKA-CHAKRA-HUB-SIZE);
                        background-color: var(--navy-blue);
                        border-radius: 999px;
                    }

                    .spoke-pair {
                        position: absolute;
                        width: 100%;
                        top: 50%;
                        left: 50%;
                        transform:
                            translate(-50%, -50%) rotate(calc(var(--i) * 15deg));
                        height: var(--SPOKE-HEIGHT);
                        display: grid;
                        grid-template-columns: 1fr var(--SPOKE-GAP-SIZE) 1fr;

                        .spoke {
                            background-color: var(--navy-blue);

                            &:first-of-type {
                                clip-path: polygon(
                                    0% 50%,
                                    calc(200% / 3) 0%,
                                    100% 50%,
                                    calc(200% / 3) 100%
                                );
                            }
                            
                            &:last-of-type {
                                clip-path: polygon(
                                    100% 50%,
                                    calc(100% / 3) 0%,
                                    0% 50%,
                                    calc(100% / 3) 100%
                                );
                            }
                        }
                    }

                    .bead-pair {
                        position: absolute;
                        width: 100%;
                        top: 50%;
                        left: 50%;
                        transform:
                            translate(-50%, -50%) 
                            rotate(calc(var(--i) * 15deg + 7.5deg));
                        height: var(--BEAD-SIZE);
                        display: flex;
                        justify-content: space-between;

                        .bead {
                            background-color: var(--navy-blue);
                            height: 100%;
                            aspect-ratio: 1 / 1;
                            border-radius: 999px;

                            &:first-of-type {
                                transform: translateX(-50%);
                            }

                            &:last-of-type {
                                transform: translateX(50%);
                            }
                        }
                    }
                }
            }

            .band-bottom {
                background-color: var(--indian-green);
            }
        }
    </style>

</body>

</html>
